[build]
  publish = "out"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[context.deploy-preview]
  publish = "out"
  command = "npm run build"

[context.branch-deploy]
  publish = "out"
  command = "npm run build"

# Redirect old .html URLs to clean URLs
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
[[redirects]]
  from = "/services.html"
  to = "/services"
  status = 301
[[redirects]]
  from = "/pricing.html"
  to = "/pricing"
  status = 301
[[redirects]]
  from = "/tools.html"
  to = "/tools"
  status = 301
[[redirects]]
  from = "/agentic.html"
  to = "/agentic"
  status = 301
[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301

# Security & transport
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; base-uri 'self'"

# No cache for HTML - force fresh content
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
