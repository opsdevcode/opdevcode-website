[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "22"

# Deploy previews: same config as production (static HTML)
# PRs get unique URLs: deploy-preview-<PR#>--<site>.netlify.app
[context.deploy-preview]
  publish = "."
  command = ""

# Branch deploys: preview non-PR branches
[context.branch-deploy]
  publish = "."
  command = ""

# Security & transport
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; base-uri 'self'"

# No cache for HTML - force fresh content
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
