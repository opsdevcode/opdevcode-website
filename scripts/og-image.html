<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OG Image - Screenshot at 1200x630</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0b0f17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      color: #e7eefc;
    }
    .logo { width: 200px; height: 200px; object-fit: contain; margin-bottom: 28px; }
    .name { font-size: 44px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 10px; }
    .tagline { font-size: 22px; color: #a6b3cc; margin-bottom: 12px; }
    .url { font-size: 18px; color: #6b7a99; }
  </style>
</head>
<body>
  <!-- Logo has transparent bg; dark page bg makes it visible. Use opsdevco-logo-o-mark (icon only) + our text for full control. -->
  <img src="../public/assets/opsdevco-logo-o-mark.png" alt="" class="logo">
  <div class="name">OPSDEVCO</div>
  <div class="tagline">Platform Engineering Advisory</div>
  <div class="url">opsdevco.de</div>
</body>
</html>
